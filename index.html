<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>스마트 출결 매니저 Pro</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="출결매니저">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="theme-color" content="#2563eb">

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .active-tab { position: relative; color: #2563eb; }
        .active-tab::after { content: ''; position: absolute; bottom: -2px; left: 0; width: 100%; height: 3px; background-color: #2563eb; border-radius: 10px; }
        .animate-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        function App() {
            const [students, setStudents] = useState(() => JSON.parse(localStorage.getItem('my_attendance_students')) || []);
            const [templates, setTemplates] = useState(() => JSON.parse(localStorage.getItem('my_attendance_templates')) || [
                { id: 'late', title: '지각', content: '[지각알림] {이름} 학생이 금일 {시간} 기준 미등교 상태입니다. 확인 부탁드립니다. - {교사}' },
                { id: 'absent', title: '결석', content: '[결석알림] {이름} 학생이 금일 결석입니다. 사유를 회신해 주세요. - {교사}' }
            ]);
            const [logs, setLogs] = useState(() => JSON.parse(localStorage.getItem('my_attendance_logs')) || []);
            const [teacherName, setTeacherName] = useState(localStorage.getItem('my_teacher_name') || '정유안 선생님');
            
            const [activeTab, setActiveTab] = useState('list');
            const [searchQuery, setSearchQuery] = useState('');
            const [selectedIds, setSelectedIds] = useState([]);
            const [targetTypes, setTargetTypes] = useState({ father: true, mother: false, self: false });
            const [currentTime, setCurrentTime] = useState(new Date());
            const [showAddModal, setShowAddModal] = useState(false);
            const [showImportModal, setShowImportModal] = useState(false);
            const [importRawRows, setImportRawRows] = useState([]);
            const [startRowIndex, setStartRowIndex] = useState(0);
            const [mapping, setMapping] = useState({ name: -1, father: -1, mother: -1, self: -1 });
            const [newStudent, setNewStudent] = useState({ name: '', father: '', mother: '', self: '' });

            useEffect(() => {
                localStorage.setItem('my_attendance_students', JSON.stringify(students));
                localStorage.setItem('my_attendance_templates', JSON.stringify(templates));
                localStorage.setItem('my_attendance_logs', JSON.stringify(logs));
                localStorage.setItem('my_teacher_name', teacherName);
            }, [students, templates, logs, teacherName]);

            useEffect(() => {
                const timer = setInterval(() => setCurrentTime(new Date()), 1000);
                return () => clearInterval(timer);
            }, []);

            const filteredStudents = useMemo(() => students.filter(s => s.name.includes(searchQuery)), [students, searchQuery]);

            const handleFileSelect = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (evt) => {
                    const text = evt.target.result;
                    const lines = text.split(/\r?\n/).filter(line => line.trim() !== '');
                    const rows = lines.map(line => line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(item => item.replace(/^"|"$/g, '').trim()));
                    setImportRawRows(rows);
                    setShowImportModal(true);
                    setStartRowIndex(rows.findIndex(r => r.some(c => c.includes('1') || c.includes('성명'))) || 0);
                };
                reader.readAsText(file, 'EUC-KR');
            };

            const confirmImport = () => {
                if (mapping.name === -1) return alert("학생 이름 칸을 선택해 주세요.");
                const dataRows = importRawRows.slice(startRowIndex);
                const newOnes = dataRows.map((row, idx) => ({
                    id: Date.now() + idx,
                    name: row[mapping.name] || '',
                    father: mapping.father !== -1 ? row[mapping.father] : '',
                    mother: mapping.mother !== -1 ? row[mapping.mother] : '',
                    self: mapping.self !== -1 ? row[mapping.self] : ''
                })).filter(s => s.name && !s.name.includes('성명') && !s.name.includes('학생명'));
                setStudents([...students, ...newOnes]);
                setShowImportModal(false);
            };

            const sendSMS = (targets, template) => {
                const timeStr = currentTime.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
                const isIos = /iPhone|iPad|iPod/i.test(navigator.userAgent);
                targets.forEach(s => {
                    const recipientNumbers = [];
                    if (targetTypes.father && s.father) recipientNumbers.push(s.father);
                    if (targetTypes.mother && s.mother) recipientNumbers.push(s.mother);
                    if (targetTypes.self && s.self) recipientNumbers.push(s.self);
                    if (recipientNumbers.length === 0) return;
                    const msg = template.content.replace(/{이름}/g, s.name).replace(/{시간}/g, timeStr).replace(/{교사}/g, teacherName);
                    window.open(`sms:${recipientNumbers.join(',')}${isIos ? '&' : '?'}body=${encodeURIComponent(msg)}`, '_blank');
                    setLogs(prev => [{ id: Date.now()+Math.random(), time: new Date().toLocaleString(), target: s.name, content: msg }, ...prev].slice(0, 50));
                });
            };

            return (
                <div className="max-w-md mx-auto bg-white min-h-screen flex flex-col shadow-2xl relative">
                    <header className="p-6 bg-blue-600 text-white sticky top-0 z-30 shadow-md">
                        <div className="flex justify-between items-center mb-4 font-black">
                            <h1 className="text-2xl tracking-tighter italic uppercase">Attendance</h1>
                            <span className="text-[10px] bg-white/20 px-2 py-1 rounded-full">{currentTime.toLocaleTimeString()}</span>
                        </div>
                        <input value={teacherName} onChange={e => setTeacherName(e.target.value)} className="bg-white/10 p-3 rounded-2xl w-full border-none outline-none font-bold" placeholder="선생님 성함" />
                    </header>

                    <nav className="flex border-b bg-white sticky top-[136px] z-30">
                        {[{id:'list',l:'명단',i:'fa-users'},{id:'templates',l:'문구',i:'fa-pen-to-square'},{id:'history',l:'이력',i:'fa-list-ul'}].map(t => (
                            <button key={t.id} onClick={() => setActiveTab(t.id)} className={`flex-1 py-4 text-sm font-bold flex items-center justify-center gap-2 ${activeTab === t.id ? 'active-tab' : 'text-slate-300'}`}>
                                <i className={`fa-solid ${t.i} text-xs`}></i>{t.l}
                            </button>
                        ))}
                    </nav>

                    <main className="flex-1 p-4 bg-slate-50 overflow-y-auto no-scrollbar pb-32">
                        {activeTab === 'list' && (
                            <div className="animate-in space-y-4">
                                <div className="space-y-2">
                                    <input placeholder="학생 이름 검색" value={searchQuery} onChange={e => setSearchQuery(e.target.value)} className="w-full px-4 py-3 rounded-2xl shadow-sm outline-none border-none font-medium text-sm" />
                                    <label className="block w-full bg-blue-600 text-white p-4 rounded-3xl text-center cursor-pointer shadow-lg active:scale-95 transition-all font-bold">
                                        <i className="fa-solid fa-file-excel mr-2"></i> 비상연락망 엑셀 업로드
                                        <input type="file" accept=".csv" onChange={handleFileSelect} className="hidden" />
                                    </label>
                                </div>
                                <div className="bg-white p-3 rounded-2xl shadow-sm border flex gap-2">
                                    {[{k:'father',l:'부'},{k:'mother',l:'모'},{k:'self',l:'본인'}].map(i => (
                                        <button key={i.k} onClick={() => setTargetTypes({...targetTypes, [i.k]: !targetTypes[i.k]})} className={`flex-1 py-2.5 rounded-xl text-xs font-black transition-all ${targetTypes[i.k] ? 'bg-blue-600 text-white shadow-md' : 'bg-slate-50 text-slate-300'}`}>{i.l}</button>
                                    ))}
                                </div>
                                <div className="space-y-3">
                                    {filteredStudents.map(s => (
                                        <div key={s.id} className={`bg-white p-4 rounded-3xl shadow-sm flex items-center gap-4 border-2 transition-all ${selectedIds.includes(s.id) ? 'border-blue-500' : 'border-transparent'}`}>
                                            <div onClick={() => setSelectedIds(p => p.includes(s.id)?p.filter(id=>id!==s.id):[...p,s.id])} className={`w-7 h-7 rounded-xl border-2 flex items-center justify-center flex-shrink-0 ${selectedIds.includes(s.id)?'bg-blue-600 border-blue-600 text-white':'border-slate-100 bg-slate-50'}`}>
                                                {selectedIds.includes(s.id) && <i className="fa-solid fa-check text-xs"></i>}
                                            </div>
                                            <div className="flex-1 truncate" onClick={() => setSelectedIds(p => p.includes(s.id)?p.filter(id=>id!==s.id):[...p,s.id])}>
                                                <div className="font-bold text-slate-800">{s.name}</div>
                                                <div className="text-[9px] text-slate-400 font-medium truncate">부:{s.father||'-'} / 모:{s.mother||'-'} / 본인:{s.self||'-'}</div>
                                            </div>
                                            <div className="flex gap-1">
                                                <button onClick={() => sendSMS([s], templates[0])} className="w-8 h-8 bg-amber-50 text-amber-500 rounded-xl flex items-center justify-center text-xs"><i className="fa-solid fa-clock"></i></button>
                                                <button onClick={() => sendSMS([s], templates[1])} className="w-8 h-8 bg-rose-50 text-rose-500 rounded-xl flex items-center justify-center text-xs"><i className="fa-solid fa-triangle-exclamation"></i></button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                        {activeTab === 'templates' && (
                            <div className="animate-in space-y-4">
                                {templates.map(tp => (
                                    <div key={tp.id} className="bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
                                        <input value={tp.title} onChange={e => setTemplates(templates.map(t=>t.id===tp.id?{...t,title:e.target.value}:t))} className="w-full font-black text-blue-600 border-b pb-1 mb-2 outline-none" />
                                        <textarea value={tp.content} onChange={e => setTemplates(templates.map(t=>t.id===tp.id?{...t,content:e.target.value}:t))} className="w-full text-xs text-slate-400 bg-slate-50 p-3 rounded-xl min-h-[80px] outline-none" />
                                        <button onClick={() => setTemplates(templates.filter(t=>t.id!==tp.id))} className="mt-2 text-rose-500 text-xs"><i className="fa-solid fa-trash-can mr-1"></i> 삭제</button>
                                    </div>
                                ))}
                                <button onClick={() => setTemplates([...templates,{id:Date.now(),title:'제목',content:''}])} className="w-full py-4 border-2 border-dashed rounded-3xl text-slate-300 font-bold">+ 문구 추가</button>
                            </div>
                        )}
                        {activeTab === 'history' && (
                            <div className="animate-in space-y-3">
                                {logs.map(log => (
                                    <div key={log.id} className="bg-white p-4 rounded-2xl shadow-sm text-xs border border-slate-100">
                                        <div className="flex justify-between font-black text-blue-600 mb-1"><span>{log.target}</span><span>{log.time}</span></div>
                                        <p className="text-slate-400 line-clamp-2">{log.content}</p>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>

                    {selectedIds.length > 0 && activeTab === 'list' && (
                        <div className="fixed bottom-6 left-1/2 -translate-x-1/2 w-[calc(100%-2rem)] max-w-sm bg-slate-900/95 backdrop-blur-md p-5 rounded-[32px] shadow-2xl z-50 animate-in">
                            <div className="flex justify-between mb-4 px-2">
                                <span className="text-white font-black text-sm">{selectedIds.length}명 선택됨</span>
                                <button onClick={() => setSelectedIds([])} className="text-xs text-slate-400 underline">취소</button>
                            </div>
                            <div className="flex gap-2 overflow-x-auto no-scrollbar">
                                {templates.map(tp => (
                                    <button key={tp.id} onClick={() => sendSMS(students.filter(s=>selectedIds.includes(s.id)), tp)} className="flex-shrink-0 bg-blue-600 text-white px-5 py-3 rounded-2xl font-black text-xs">단체 {tp.title}</button>
                                ))}
                            </div>
                        </div>
                    )}

                    {showImportModal && (
                        <div className="fixed inset-0 bg-slate-900/90 backdrop-blur-md z-[100] flex items-center justify-center p-6">
                            <div className="bg-white w-full rounded-[40px] p-8 animate-in max-h-[85vh] flex flex-col overflow-hidden">
                                <h3 className="text-xl font-black mb-1 text-blue-600">데이터 매칭</h3>
                                <div className="flex-1 overflow-y-auto no-scrollbar py-4 space-y-6">
                                    <div className="space-y-2">
                                        <label className="text-[10px] font-black text-slate-500 uppercase">1단계: 학생 1번 데이터 줄 선택</label>
                                        <div className="bg-slate-50 rounded-2xl border overflow-auto h-32 text-[10px]">
                                            <table className="w-full border-collapse">
                                                <tbody>
                                                    {importRawRows.slice(0, 10).map((row, idx) => (
                                                        <tr key={idx} onClick={() => setStartRowIndex(idx)} className={`border-b ${startRowIndex === idx ? 'bg-blue-100 text-blue-700' : 'text-slate-400'}`}>
                                                            <td className="p-2 border-r">{idx+1}행</td><td className="p-2 truncate">{row.join(' | ')}</td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                    <div className="space-y-3">
                                        <label className="text-[10px] font-black text-slate-500 uppercase">2단계: 각 항목 매칭</label>
                                        {[{k:'name',l:'이름',i:'fa-user'},{k:'father',l:'부 번호',i:'fa-person'},{k:'mother',l:'모 번호',i:'fa-person-dress'},{k:'self',l:'본인 번호',i:'fa-mobile'}].map(f => (
                                            <div key={f.k} className="flex items-center gap-3 bg-slate-50 p-2 rounded-2xl">
                                                <i className={`fa-solid ${f.i} text-slate-300 w-5`}></i>
                                                <div className="flex-1 text-[11px] font-bold text-slate-700">{f.l}</div>
                                                <select className="bg-white border rounded p-1 text-[10px]" value={mapping[f.k]} onChange={e => setMapping({...mapping, [f.k]: parseInt(e.target.value)})}>
                                                    <option value="-1">미지정</option>
                                                    {importRawRows[startRowIndex]?.map((h, i) => (<option key={i} value={i}>{i+1}번 칸</option>))}
                                                </select>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                <div className="flex gap-4 pt-4">
                                    <button onClick={() => setShowImportModal(false)} className="flex-1 font-bold text-slate-400">취소</button>
                                    <button onClick={confirmImport} className="flex-1 bg-blue-600 text-white py-4 rounded-2xl font-black">완료</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
