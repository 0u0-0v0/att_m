<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>스마트 출결 매니저 Pro</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="출결매니저">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="theme-color" content="#2563eb">

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .active-tab { position: relative; color: #2563eb; }
        .active-tab::after { content: ''; position: absolute; bottom: -2px; left: 0; width: 100%; height: 3px; background-color: #2563eb; border-radius: 10px; }
        .animate-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        function App() {
            // --- 데이터 상태 관리 ---
            const [groups, setGroups] = useState(() => JSON.parse(localStorage.getItem('att_groups')) || ['1반']);
            const [activeGroupId, setActiveGroupId] = useState(() => localStorage.getItem('att_active_group') || '전체');
            const [students, setStudents] = useState(() => JSON.parse(localStorage.getItem('att_students')) || []);
            const [templates, setTemplates] = useState(() => JSON.parse(localStorage.getItem('att_templates')) || [
                { id: 't1', title: '결석', content: '[결석알림] {이름} 학생이 금일 결석입니다. 사유를 회신해 주세요. - {교사}' },
                { id: 't2', title: '지각', content: '[지각알림] {이름} 학생이 금일 {시간} 기준 미등교 상태입니다. 확인 부탁드립니다. - {교사}' }
            ]);
            const [teacherName, setTeacherName] = useState(localStorage.getItem('att_teacher_name') || '정유안 선생님');
            
            const [activeTab, setActiveTab] = useState('list');
            const [searchQuery, setSearchQuery] = useState('');
            const [selectedIds, setSelectedIds] = useState([]);
            const [currentTime, setCurrentTime] = useState(new Date());
            const [showAddModal, setShowAddModal] = useState(false);
            const [editingStudent, setEditingStudent] = useState(null);
            const [showGroupModal, setShowGroupModal] = useState(false);

            useEffect(() => {
                localStorage.setItem('att_groups', JSON.stringify(groups));
                localStorage.setItem('att_active_group', activeGroupId);
                localStorage.setItem('att_students', JSON.stringify(students));
                localStorage.setItem('att_templates', JSON.stringify(templates));
                localStorage.setItem('att_teacher_name', teacherName);
            }, [groups, activeGroupId, students, templates, teacherName]);

            useEffect(() => {
                const timer = setInterval(() => setCurrentTime(new Date()), 1000);
                return () => clearInterval(timer);
            }, []);

            const filteredStudents = useMemo(() => {
                return students.filter(s => 
                    (activeGroupId === '전체' || s.group === activeGroupId) && 
                    s.name.includes(searchQuery)
                );
            }, [students, activeGroupId, searchQuery]);

            // --- 학생 관리 로직 ---
            const toggleStudentTarget = (studentId, type) => {
                setStudents(students.map(s => {
                    if (s.id === studentId) {
                        const currentTargets = s.activeTargets || { self: true, father: false, mother: false };
                        return { ...s, activeTargets: { ...currentTargets, [type]: !currentTargets[type] } };
                    }
                    return s;
                }));
            };

            const deleteStudent = (id) => {
                if (confirm("이 학생을 삭제하시겠습니까?")) {
                    setStudents(students.filter(s => s.id !== id));
                    setSelectedIds(selectedIds.filter(sid => sid !== id));
                    setShowAddModal(false);
                }
            };

            const deleteSelectedStudents = () => {
                if (confirm(`선택한 ${selectedIds.length}명의 학생을 삭제하시겠습니까?`)) {
                    setStudents(students.filter(s => !selectedIds.includes(s.id)));
                    setSelectedIds([]);
                }
            };

            // --- 엑셀(CSV) 및 백업 ---
            const downloadTemplate = () => {
                // 투넘버 예시 포함
                const csv = "\ufeff학급,이름,본인번호,부번호,모번호,메모\n1반,홍길동,*28101000000000,*28101011112222,01033334444,투넘버사용예시";
                const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = '출결명단_양식.csv'; a.click();
            };

            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (evt) => {
                    const text = evt.target.result;
                    const rows = text.split(/\r?\n/).filter(l => l.trim() !== '');
                    const newGrps = new Set(groups);
                    
                    const newStus = rows.slice(1).map((row, i) => {
                        // 쉼표로 분리하되, 따옴표 내부는 무시하는 정규식 사용 (안정성 강화)
                        const c = row.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g) || row.split(',');
                        const clean = (val) => (val || '').replace(/"/g, '').trim();
                        
                        let gName = clean(c[0]) || '1반';
                        // 투넘버 기호(*)가 있거나 숫자로 시작하면 반 이름이 아님
                        if (/^[\*0-9]/.test(gName)) gName = '미분류';
                        
                        if (gName) newGrps.add(gName);
                        return { 
                            id: Date.now() + i + Math.random(), 
                            group: gName, 
                            name: clean(c[1]) || '이름없음', 
                            self: clean(c[2]) || '', 
                            father: clean(c[3]) || '', 
                            mother: clean(c[4]) || '', 
                            memo: clean(c[5]) || '',
                            activeTargets: { self: true, father: false, mother: false }
                        };
                    }).filter(s => s.name !== '이름없음');

                    setGroups(Array.from(newGrps));
                    setStudents([...students, ...newStus]);
                    alert(`${newStus.length}명 추가 완료!`);
                };
                reader.readAsText(file, 'EUC-KR');
            };

            const exportData = () => {
                const data = { groups, students, templates, teacherName };
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `출결_백업.json`; a.click();
            };

            const importData = (e) => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = (evt) => {
                    const d = JSON.parse(evt.target.result);
                    setGroups(d.groups); setStudents(d.students); setTemplates(d.templates); alert("복구 완료!");
                };
                reader.readAsText(file);
            };

            // --- 발송 로직 ---
            const makeCall = (s) => {
                const targets = s.activeTargets || { self: true };
                let p = targets.self && s.self ? s.self : (targets.father && s.father ? s.father : s.mother);
                if (!p) p = s.self || s.father || s.mother;
                if (p) window.location.href = `tel:${p}`; else alert("번호 없음");
            };

            const sendSMS = (targets, tp) => {
                const tStr = currentTime.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
                const isIos = /iPhone|iPad|iPod/i.test(navigator.userAgent);
                targets.forEach(s => {
                    const activeT = s.activeTargets || { self: true, father: false, mother: false };
                    const rec = [];
                    if (activeT.self && s.self) rec.push(s.self);
                    if (activeT.father && s.father) rec.push(s.father);
                    if (activeT.mother && s.mother) rec.push(s.mother);
                    if (rec.length === 0) return;
                    
                    const msg = tp.content.replace(/{이름}/g, s.name).replace(/{시간}/g, tStr).replace(/{교사}/g, teacherName);
                    // 투넘버 기호(*)가 포함된 채로 전송
                    window.open(`sms:${rec.join(',')}${isIos ? '&' : '?'}body=${encodeURIComponent(msg)}`, '_blank');
                });
            };

            return (
                <div className="max-w-md mx-auto bg-white min-h-screen flex flex-col shadow-2xl relative">
                    <header className="p-6 bg-blue-600 text-white sticky top-0 z-30 shadow-md">
                        <div className="flex justify-between items-center mb-4 font-black italic uppercase text-2xl tracking-tighter">
                            <h1>Attendance Pro</h1>
                            <span className="text-[10px] bg-white/20 px-2 py-1 rounded-full font-bold">{currentTime.toLocaleTimeString()}</span>
                        </div>
                        <input value={teacherName} onChange={e => setTeacherName(e.target.value)} className="bg-white/10 p-3 rounded-2xl w-full border-none outline-none font-bold placeholder:text-blue-100 shadow-inner" placeholder="교사 성함" />
                    </header>

                    <nav className="flex border-b bg-white sticky top-[136px] z-30 shadow-sm">
                        {[{id:'list',l:'명단',i:'fa-users'},{id:'templates',l:'문구',i:'fa-pen-to-square'}].map(t => (
                            <button key={t.id} onClick={() => setActiveTab(t.id)} className={`flex-1 py-4 text-sm font-bold flex items-center justify-center gap-2 ${activeTab === t.id ? 'active-tab' : 'text-slate-300'}`}>
                                <i className={`fa-solid ${t.i} text-xs`}></i>{t.l}
                            </button>
                        ))}
                    </nav>

                    <main className="flex-1 p-4 bg-slate-50 overflow-y-auto no-scrollbar pb-52">
                        {activeTab === 'list' && (
                            <div className="animate-in space-y-4">
                                <div className="space-y-3">
                                    <div className="flex gap-2 overflow-x-auto no-scrollbar pb-2 items-center">
                                        <button onClick={() => setShowGroupModal(true)} className="flex-shrink-0 w-10 h-10 rounded-xl bg-slate-800 text-white flex items-center justify-center shadow-lg"><i className="fa-solid fa-cog"></i></button>
                                        {['전체', ...groups].map(g => (
                                            <button key={g} onClick={() => setActiveGroupId(g)} className={`flex-shrink-0 px-5 py-2.5 rounded-xl text-[11px] font-black transition-all ${activeGroupId === g ? 'bg-blue-600 text-white shadow-md' : 'bg-white text-slate-400 border'}`}>{g}</button>
                                        ))}
                                    </div>
                                    <input placeholder="학생 이름 검색" value={searchQuery} onChange={e => setSearchQuery(e.target.value)} className="w-full px-4 py-3 rounded-2xl shadow-sm outline-none border-none font-medium text-sm" />
                                    <div className="flex gap-2 text-[11px] font-black">
                                        <button onClick={downloadTemplate} className="flex-1 bg-white border-2 border-slate-100 py-3.5 rounded-2xl text-blue-600 shadow-sm active:bg-blue-50">양식 받기</button>
                                        <label className="flex-1 bg-blue-600 border border-blue-600 py-3.5 rounded-2xl text-white text-center cursor-pointer shadow-lg active:scale-95 transition-all">
                                            명단 올리기 <input type="file" accept=".csv" onChange={handleFileUpload} className="hidden" />
                                        </label>
                                    </div>
                                </div>

                                <div className="space-y-3">
                                    {filteredStudents.map(s => {
                                        const targets = s.activeTargets || { self: true, father: false, mother: false };
                                        return (
                                        <div key={s.id} className={`bg-white p-4 rounded-3xl shadow-sm flex flex-col gap-3 border-2 transition-all ${selectedIds.includes(s.id) ? 'border-blue-500 ring-4 ring-blue-50' : 'border-transparent'}`}>
                                            <div className="flex items-center gap-3">
                                                <div onClick={() => setSelectedIds(p => p.includes(s.id)?p.filter(id=>id!==s.id):[...p,s.id])} className={`w-7 h-7 rounded-xl border-2 flex items-center justify-center flex-shrink-0 ${selectedIds.includes(s.id)?'bg-blue-600 border-blue-600 text-white':'border-slate-100 bg-slate-50'}`}>
                                                    {selectedIds.includes(s.id) && <i className="fa-solid fa-check text-xs"></i>}
                                                </div>
                                                <div className="flex-1 truncate" onClick={() => { setEditingStudent(s); setShowAddModal(true); }}>
                                                    <div className="font-bold text-slate-800 text-sm">{s.name} <span className="text-[9px] bg-slate-100 px-1.5 py-0.5 rounded-lg text-slate-400 font-medium ml-1">{s.group}</span></div>
                                                    {s.memo && <div className="text-[9px] text-blue-500 font-medium truncate mt-0.5"><i className="fa-solid fa-note-sticky mr-1"></i>{s.memo}</div>}
                                                </div>
                                                <div className="flex flex-wrap gap-1 justify-end max-w-[150px]">
                                                    <button onClick={() => makeCall(s)} className="w-8 h-8 bg-emerald-50 text-emerald-500 rounded-xl flex items-center justify-center text-[10px] active:scale-90"><i className="fa-solid fa-phone"></i></button>
                                                    {templates.map((tp, idx) => (
                                                        <button key={tp.id} onClick={() => sendSMS([s], tp)} className={`px-2.5 h-8 rounded-xl flex items-center justify-center text-[10px] font-black active:scale-90 transition-transform ${idx === 0 ? 'bg-rose-50 text-rose-500' : idx === 1 ? 'bg-amber-50 text-amber-500' : 'bg-blue-50 text-blue-500'}`}>{tp.title}</button>
                                                    ))}
                                                </div>
                                            </div>
                                            <div className="flex gap-1.5 pt-1 border-t border-slate-50">
                                                {[{k:'self',l:'본인'},{k:'father',l:'부'},{k:'mother',l:'모'}].map(t => (
                                                    <button key={t.k} onClick={() => toggleStudentTarget(s.id, t.k)} className={`flex-1 py-1.5 rounded-xl text-[10px] font-black transition-all ${targets[t.k] ? 'bg-slate-800 text-white shadow-sm' : 'bg-slate-100 text-slate-400'}`}>{t.l}</button>
                                                ))}
                                            </div>
                                        </div>
                                        );
                                    })}
                                </div>
                            </div>
                        )}

                        {activeTab === 'templates' && (
                            <div className="animate-in space-y-4 pb-10">
                                {templates.map(tp => (
                                    <div key={tp.id} className="bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
                                        <input value={tp.title} onChange={e => setTemplates(templates.map(t=>t.id===tp.id?{...t,title:e.target.value}:t))} className="w-full font-black text-blue-600 border-b pb-2 mb-3 outline-none border-slate-50 focus:border-blue-200" placeholder="제목" />
                                        <textarea id={`textarea-${tp.id}`} value={tp.content} onChange={e => setTemplates(templates.map(t=>t.id===tp.id?{...t,content:e.target.value}:t))} className="w-full text-xs text-slate-500 bg-slate-50 p-4 rounded-2xl min-h-[100px] outline-none leading-relaxed" />
                                        <button onClick={() => confirm('삭제?') && setTemplates(templates.filter(t=>t.id!==tp.id))} className="mt-3 text-rose-500 text-[10px] font-bold">삭제</button>
                                    </div>
                                ))}
                                <button onClick={() => setTemplates([...templates,{id:'t'+Date.now(),title:'새 문구',content:''}])} className="w-full py-4 border-2 border-dashed border-slate-200 rounded-3xl text-slate-300 font-bold active:bg-white transition-colors">+ 추가</button>
                                <div className="mt-12 pt-8 border-t flex gap-2">
                                    <button onClick={exportData} className="flex-1 bg-slate-900 text-white py-4 rounded-3xl text-[11px] font-black">백업</button>
                                    <label className="flex-1 bg-white border-2 py-4 rounded-3xl text-[11px] font-black text-slate-500 text-center cursor-pointer shadow-sm"><i className="fa-solid fa-upload"></i> 복구 <input type="file" accept=".json" onChange={importData} className="hidden" /></label>
                                </div>
                            </div>
                        )}
                    </main>

                    {selectedIds.length > 0 && activeTab === 'list' && (
                        <div className="fixed bottom-6 left-1/2 -translate-x-1/2 w-[calc(100%-2rem)] max-w-sm bg-slate-900/95 backdrop-blur-md p-6 rounded-[40px] shadow-2xl z-50 animate-in border border-white/10 flex flex-col gap-4 items-center">
                            <div className="flex justify-between w-full px-2 items-center text-white font-black text-sm mb-2">
                                <span>{selectedIds.length}명 선택됨</span>
                                <button onClick={deleteSelectedStudents} className="bg-rose-500/20 text-rose-400 px-3 py-1.5 rounded-xl text-[10px] font-bold"><i className="fa-solid fa-trash-can mr-1"></i>삭제</button>
                            </div>
                            <div className="flex flex-wrap gap-2 justify-center pb-1">
                                {templates.map(tp => (
                                    <button key={tp.id} onClick={() => sendSMS(students.filter(s=>selectedIds.includes(s.id)), tp)} className="bg-blue-600 text-white px-5 py-3 rounded-2xl font-black text-[11px] whitespace-nowrap active:bg-blue-500">{tp.title} 발송</button>
                                ))}
                                <button onClick={() => setSelectedIds([])} className="px-5 py-3 bg-slate-700 text-white rounded-2xl font-black text-[11px]">취소</button>
                            </div>
                        </div>
                    )}

                    {activeTab === 'list' && selectedIds.length === 0 && (
                        <button onClick={() => { setEditingStudent(null); setShowAddModal(true); }} className="fixed bottom-6 right-6 w-14 h-14 bg-blue-600 text-white rounded-full shadow-2xl flex items-center justify-center text-xl z-40 active:scale-90 transition-transform"><i className="fa-solid fa-plus"></i></button>
                    )}

                    {showAddModal && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[80] flex items-center justify-center p-6">
                            <div className="bg-white w-full rounded-[44px] p-8 animate-in shadow-2xl overflow-y-auto max-h-[90vh] border border-white/20">
                                <h3 className="text-xl font-black mb-6 text-blue-600 text-center">{editingStudent ? '정보 수정' : '학생 직접 추가'}</h3>
                                <div className="space-y-4 text-xs font-bold">
                                    <div className="grid grid-cols-2 gap-2">
                                        <select className="w-full p-4 bg-slate-50 rounded-2xl outline-none" value={editingStudent?.group || (activeGroupId === '전체' ? groups[0] : activeGroupId)} onChange={e => setEditingStudent({...editingStudent, group: e.target.value})}>
                                            {groups.map(g => <option key={g} value={g}>{g}</option>)}
                                        </select>
                                        <input className="w-full p-4 bg-slate-50 rounded-2xl outline-none border focus:border-blue-500 font-bold" value={editingStudent?.name || ''} onChange={e => setEditingStudent({...editingStudent, name: e.target.value})} placeholder="이름" />
                                    </div>
                                    <input className="w-full p-4 bg-slate-50 rounded-2xl outline-none font-medium" value={editingStudent?.self || ''} onChange={e => setEditingStudent({...editingStudent, self: e.target.value})} placeholder="본인 번호" />
                                    <div className="grid grid-cols-2 gap-2 font-medium">
                                        <input className="w-full p-4 bg-slate-50 rounded-2xl outline-none" value={editingStudent?.father || ''} onChange={e => setEditingStudent({...editingStudent, father: e.target.value})} placeholder="부 번호" />
                                        <input className="w-full p-4 bg-slate-50 rounded-2xl outline-none" value={editingStudent?.mother || ''} onChange={e => setEditingStudent({...editingStudent, mother: e.target.value})} placeholder="모 번호" />
                                    </div>
                                    <textarea className="w-full p-4 bg-slate-50 rounded-2xl outline-none min-h-[80px]" value={editingStudent?.memo || ''} onChange={e => setEditingStudent({...editingStudent, memo: e.target.value})} placeholder="특이사항 메모" />
                                    <div className="flex flex-col gap-2 pt-4">
                                        <button onClick={() => { 
                                            const final = { ...editingStudent, group: editingStudent?.group || (activeGroupId === '전체' ? groups[0] : activeGroupId), activeTargets: editingStudent?.activeTargets || { self: true, father: false, mother: false } };
                                            if(final.name) { 
                                                if(final.id) setStudents(students.map(st => st.id === final.id ? final : st));
                                                else setStudents([...students, {...final, id: Date.now()}]);
                                                setShowAddModal(false); 
                                            } 
                                        }} className="w-full bg-blue-600 text-white py-4 rounded-3xl font-black shadow-lg">저장하기</button>
                                        <div className="flex gap-2">
                                            {editingStudent && <button onClick={() => deleteStudent(editingStudent.id)} className="flex-1 bg-rose-50 text-rose-500 font-bold py-4 rounded-3xl border border-rose-100">학생 삭제</button>}
                                            <button onClick={() => setShowAddModal(false)} className="flex-1 font-bold text-slate-400 py-4">취소</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {showGroupModal && (
                        <div className="fixed inset-0 bg-slate-900/90 backdrop-blur-md z-[100] flex items-center justify-center p-6">
                            <div className="bg-white w-full rounded-[44px] p-8 animate-in max-h-[85vh] flex flex-col shadow-2xl">
                                <h3 className="text-xl font-black mb-1 text-blue-600 text-center">학급 관리</h3>
                                <div className="flex-1 overflow-y-auto no-scrollbar space-y-3 mt-6">
                                    {groups.map(g => (
                                        <div key={g} className="flex items-center gap-3 bg-slate-50 p-4 rounded-3xl border border-slate-100">
                                            <span className="flex-1 font-black text-slate-700 text-sm">{g}</span>
                                            <button onClick={() => {
                                                const n = prompt("새 이름", g);
                                                if(n && n !== g) { setGroups(groups.map(x => x === g ? n : x)); setStudents(students.map(s => s.group === g ? {...s, group: n} : s)); }
                                            }} className="w-9 h-9 bg-white text-blue-600 rounded-xl shadow-sm flex items-center justify-center text-xs"><i className="fa-solid fa-pen"></i></button>
                                            <button onClick={() => {
                                                if(groups.length <= 1) return alert("최소 하나의 반은 있어야 합니다.");
                                                if(confirm(`'${g}' 반을 삭제할까요?`)) { setGroups(groups.filter(x => x !== g)); setStudents(students.filter(s => s.group !== g)); setActiveGroupId('전체'); }
                                            }} className="w-9 h-9 bg-rose-50 text-rose-500 rounded-xl shadow-sm flex items-center justify-center text-xs"><i className="fa-solid fa-trash-can"></i></button>
                                        </div>
                                    ))}
                                    <button onClick={() => { const n = prompt('추가할 반 이름'); if(n) setGroups([...groups, n]); }} className="w-full py-4 border-2 border-dashed border-slate-200 rounded-3xl text-slate-400 font-bold text-xs mt-4">+ 새로운 학급 추가</button>
                                </div>
                                <button onClick={() => setShowGroupModal(false)} className="w-full bg-slate-900 text-white py-4 rounded-2xl font-black mt-6">닫기</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
