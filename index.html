<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>스마트 출결 매니저 Pro</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="출결매니저">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="theme-color" content="#2563eb">

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .active-tab { position: relative; color: #2563eb; }
        .active-tab::after { content: ''; position: absolute; bottom: -2px; left: 0; width: 100%; height: 3px; background-color: #2563eb; border-radius: 10px; }
        .animate-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        /* 단체바 애니메이션 */
        .slide-up { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes slideUp { from { transform: translate(-50%, 100%); } to { transform: translate(-50%, 0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        function App() {
            // --- 데이터 상태 ---
            const [groups, setGroups] = useState(() => JSON.parse(localStorage.getItem('att_groups')) || ['1반']);
            const [activeGroupId, setActiveGroupId] = useState(() => localStorage.getItem('att_active_group') || '전체');
            const [students, setStudents] = useState(() => JSON.parse(localStorage.getItem('att_students')) || []);
            const [templates, setTemplates] = useState(() => JSON.parse(localStorage.getItem('att_templates')) || [
                { id: 't1', title: '결석', content: '[결석알림] {이름} 학생이 금일 결석입니다. 사유를 회신해 주세요. - {교사}' },
                { id: 't2', title: '지각', content: '[지각알림] {이름} 학생이 금일 {시간} 기준 미등교 상태입니다. 확인 부탁드립니다. - {교사}' }
            ]);
            const [teacherName, setTeacherName] = useState(localStorage.getItem('att_teacher_name') || '정유안 선생님');
            
            // --- UI 상태 ---
            const [activeTab, setActiveTab] = useState('list');
            const [searchQuery, setSearchQuery] = useState('');
            const [selectedIds, setSelectedIds] = useState([]);
            const [currentTime, setCurrentTime] = useState(new Date());
            const [showAddModal, setShowAddModal] = useState(false);
            const [editingStudent, setEditingStudent] = useState(null);
            const [showGroupModal, setShowGroupModal] = useState(false);

            useEffect(() => {
                localStorage.setItem('att_groups', JSON.stringify(groups));
                localStorage.setItem('att_active_group', activeGroupId);
                localStorage.setItem('att_students', JSON.stringify(students));
                localStorage.setItem('att_templates', JSON.stringify(templates));
                localStorage.setItem('att_teacher_name', teacherName);
            }, [groups, activeGroupId, students, templates, teacherName]);

            useEffect(() => {
                const timer = setInterval(() => setCurrentTime(new Date()), 1000);
                return () => clearInterval(timer);
            }, []);

            const filteredStudents = useMemo(() => {
                return students.filter(s => 
                    (activeGroupId === '전체' || s.group === activeGroupId) && 
                    s.name.includes(searchQuery)
                ).sort((a, b) => a.name.localeCompare(b.name));
            }, [students, activeGroupId, searchQuery]);

            // --- 기능 로직 ---
            const toggleStudentTarget = (studentId, type) => {
                setStudents(students.map(s => {
                    if (s.id === studentId) {
                        const currentTargets = s.activeTargets || { self: true, father: false, mother: false };
                        return { ...s, activeTargets: { ...currentTargets, [type]: !currentTargets[type] } };
                    }
                    return s;
                }));
            };

            const deleteStudent = (id) => {
                if (confirm("이 학생을 삭제하시겠습니까?")) {
                    setStudents(students.filter(s => s.id !== id));
                    setSelectedIds(selectedIds.filter(sid => sid !== id));
                    setShowAddModal(false);
                }
            };

            const deleteSelectedStudents = () => {
                if (confirm(`선택한 ${selectedIds.length}명의 학생을 명단에서 삭제하시겠습니까?`)) {
                    setStudents(students.filter(s => !selectedIds.includes(s.id)));
                    setSelectedIds([]);
                }
            };

            const insertTag = (id, tag) => {
                const el = document.getElementById(`textarea-${id}`);
                if (!el) return;
                const start = el.selectionStart;
                const end = el.selectionEnd;
                const text = templates.find(t => t.id === id).content;
                const nextText = text.substring(0, start) + tag + text.substring(end);
                setTemplates(templates.map(t => t.id === id ? {...t, content: nextText} : t));
                setTimeout(() => { el.focus(); el.setSelectionRange(start + tag.length, start + tag.length); }, 10);
            };

            // --- 발송 로직 (중요: 단체 문자 대응) ---
            const makeCall = (s) => {
                const targets = s.activeTargets || { self: true };
                let p = targets.self && s.self ? s.self : (targets.father && s.father ? s.father : s.mother);
                if (!p) p = s.self || s.father || s.mother;
                if (p) window.location.href = `tel:${p.replace(/[^0-9*]/g, '')}`; else alert("번호가 없습니다.");
            };

            const sendSMS = (targets, tp) => {
                if (targets.length === 0) return;
                
                const timeStr = currentTime.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
                const isIos = /iPhone|iPad|iPod/i.test(navigator.userAgent);
                const separator = isIos ? ',' : ';'; // iOS는 콤마, 안드로이드는 세미콜론 권장이나 보통 콤마도 작동

                const allNumbers = [];
                const allNames = targets.map(s => s.name).join(', ');

                targets.forEach(s => {
                    const activeT = s.activeTargets || { self: true, father: false, mother: false };
                    if (activeT.self && s.self) allNumbers.push(s.self.replace(/[^0-9*]/g, ''));
                    if (activeT.father && s.father) allNumbers.push(s.father.replace(/[^0-9*]/g, ''));
                    if (activeT.mother && s.mother) allNumbers.push(s.mother.replace(/[^0-9*]/g, ''));
                });

                if (allNumbers.length === 0) return alert("발송할 번호가 없습니다.");

                // 개별 학생의 이름이 들어가는 태그 처리는 단체 발송 시 '학생들'로 묶거나 첫 학생 이름으로 대체
                const msg = tp.content
                    .replace(/{이름}/g, targets.length > 1 ? `${targets[0].name} 외 ${targets.length-1}명` : targets[0].name)
                    .replace(/{시간}/g, timeStr)
                    .replace(/{교사}/g, teacherName);

                const finalUrl = `sms:${allNumbers.join(separator)}${isIos ? '&' : '?'}body=${encodeURIComponent(msg)}`;
                window.location.href = finalUrl;
            };

            // --- CSV 처리 ---
            const downloadTemplate = () => {
                const csv = "\ufeff학급,이름,본인번호,부번호,모번호,메모\n1반,홍길동,*28101012345678,01011112222,01033334444,비고";
                const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = '출결명단_양식.csv'; a.click();
            };

            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (evt) => {
                    const rows = evt.target.result.split(/\r?\n/).filter(l => l.trim() !== '');
                    const newGrps = new Set(groups);
                    const newStus = rows.slice(1).map((row, i) => {
                        const c = row.split(',').map(v => v.trim().replace(/"/g, ''));
                        let gName = c[0] || '1반';
                        if (gName.startsWith('010') || gName.startsWith('*')) gName = '미분류';
                        if (gName) newGrps.add(gName);
                        return { 
                            id: Date.now()+i+Math.random(), group: gName, name: c[1] || '이름없음', self: c[2] || '', father: c[3] || '', mother: c[4] || '', memo: c[5] || '',
                            activeTargets: { self: true, father: false, mother: false }
                        };
                    }).filter(s => s.name !== '이름없음');
                    setGroups(Array.from(newGrps));
                    setStudents([...students, ...newStus]);
                    alert(`${newStus.length}명 추가 완료!`);
                };
                reader.readAsText(file, 'EUC-KR');
            };

            return (
                <div className="max-w-md mx-auto bg-white min-h-screen flex flex-col shadow-2xl relative">
                    <header className="p-6 bg-blue-600 text-white sticky top-0 z-40 shadow-md">
                        <div className="flex justify-between items-center mb-4 font-black italic uppercase text-2xl tracking-tighter">
                            <h1>Attendance Pro</h1>
                            <span className="text-[10px] bg-white/20 px-2 py-1 rounded-full font-bold">{currentTime.toLocaleTimeString()}</span>
                        </div>
                        <input value={teacherName} onChange={e => setTeacherName(e.target.value)} className="bg-white/10 p-3 rounded-2xl w-full border-none outline-none font-bold placeholder:text-blue-100 shadow-inner" placeholder="선생님 성함" />
                    </header>

                    <nav className="flex border-b bg-white sticky top-[136px] z-40 shadow-sm">
                        {[{id:'list',l:'명단',i:'fa-users'},{id:'templates',l:'문구',i:'fa-pen-to-square'}].map(t => (
                            <button key={t.id} onClick={() => setActiveTab(t.id)} className={`flex-1 py-4 text-sm font-bold flex items-center justify-center gap-2 ${activeTab === t.id ? 'active-tab' : 'text-slate-300'}`}>
                                <i className={`fa-solid ${t.i} text-xs`}></i>{t.l}
                            </button>
                        ))}
                    </nav>

                    <main className="flex-1 p-4 bg-slate-50 overflow-y-auto no-scrollbar pb-60">
                        {activeTab === 'list' && (
                            <div className="animate-in space-y-4">
                                <div className="space-y-3">
                                    <div className="flex gap-2 overflow-x-auto no-scrollbar pb-2 items-center">
                                        <button onClick={() => setShowGroupModal(true)} className="flex-shrink-0 w-10 h-10 rounded-xl bg-slate-800 text-white flex items-center justify-center shadow-lg"><i className="fa-solid fa-cog"></i></button>
                                        {['전체', ...groups].map(g => (
                                            <button key={g} onClick={() => setActiveGroupId(g)} className={`flex-shrink-0 px-5 py-2.5 rounded-xl text-[11px] font-black transition-all ${activeGroupId === g ? 'bg-blue-600 text-white shadow-md' : 'bg-white text-slate-400 border'}`}>{g}</button>
                                        ))}
                                    </div>
                                    <input placeholder="학생 이름 검색" value={searchQuery} onChange={e => setSearchQuery(e.target.value)} className="w-full px-4 py-3 rounded-2xl shadow-sm outline-none border-none font-medium text-sm" />
                                    <div className="flex gap-2 text-[11px] font-black">
                                        <button onClick={downloadTemplate} className="flex-1 bg-white border-2 border-slate-100 py-3.5 rounded-2xl text-blue-600 active:bg-blue-50">양식 받기</button>
                                        <label className="flex-1 bg-blue-600 border border-blue-600 py-3.5 rounded-2xl text-white text-center cursor-pointer shadow-lg">
                                            명단 올리기 <input type="file" accept=".csv" onChange={handleFileUpload} className="hidden" />
                                        </label>
                                    </div>
                                </div>

                                <div className="space-y-3">
                                    {filteredStudents.map(s => {
                                        const targets = s.activeTargets || { self: true, father: false, mother: false };
                                        return (
                                        <div key={s.id} className={`bg-white p-4 rounded-3xl shadow-sm flex flex-col gap-3 border-2 transition-all ${selectedIds.includes(s.id) ? 'border-blue-500 ring-4 ring-blue-50' : 'border-transparent'}`}>
                                            <div className="flex items-center gap-3">
                                                <div onClick={() => setSelectedIds(p => p.includes(s.id)?p.filter(id=>id!==s.id):[...p,s.id])} className={`w-8 h-8 rounded-xl border-2 flex items-center justify-center flex-shrink-0 ${selectedIds.includes(s.id)?'bg-blue-600 border-blue-600 text-white':'border-slate-100 bg-slate-50'}`}>
                                                    {selectedIds.includes(s.id) && <i className="fa-solid fa-check text-xs"></i>}
                                                </div>
                                                <div className="flex-1 truncate" onClick={() => { setEditingStudent(s); setShowAddModal(true); }}>
                                                    <div className="font-bold text-slate-800 text-sm">{s.name} <span className="text-[9px] bg-slate-100 px-1.5 py-0.5 rounded-lg text-slate-400 font-medium ml-1">{s.group}</span></div>
                                                    {s.memo && <div className="text-[9px] text-blue-500 font-medium truncate mt-0.5 tracking-tight"><i className="fa-solid fa-note-sticky mr-1"></i>{s.memo}</div>}
                                                </div>
                                                <div className="flex flex-wrap gap-1 justify-end max-w-[150px]">
                                                    <button onClick={() => makeCall(s)} className="w-8 h-8 bg-emerald-50 text-emerald-500 rounded-xl flex items-center justify-center text-[10px]"><i className="fa-solid fa-phone"></i></button>
                                                    {templates.map((tp, idx) => (
                                                        <button key={tp.id} onClick={() => sendSMS([s], tp)} className={`px-2.5 h-8 rounded-xl flex items-center justify-center text-[10px] font-black ${idx === 0 ? 'bg-rose-50 text-rose-500' : idx === 1 ? 'bg-amber-50 text-amber-500' : 'bg-blue-50 text-blue-500'}`}>{tp.title}</button>
                                                    ))}
                                                </div>
                                            </div>
                                            <div className="flex gap-1.5 pt-1 border-t border-slate-50">
                                                {[{k:'self',l:'본인'},{k:'father',l:'부'},{k:'mother',l:'모'}].map(t => (
                                                    <button key={t.k} onClick={() => toggleStudentTarget(s.id, t.k)} className={`flex-1 py-1.5 rounded-xl text-[10px] font-black transition-all ${targets[t.k] ? 'bg-slate-800 text-white shadow-sm' : 'bg-slate-100 text-slate-400'}`}>{t.l}</button>
                                                ))}
                                            </div>
                                        </div>
                                        );
                                    })}
                                </div>
                            </div>
                        )}

                        {activeTab === 'templates' && (
                            <div className="animate-in space-y-4 pb-10">
                                {templates.map(tp => (
                                    <div key={tp.id} className="bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
                                        <input value={tp.title} onChange={e => setTemplates(templates.map(t=>t.id===tp.id?{...t,title:e.target.value}:t))} className="w-full font-black text-blue-600 border-b pb-1 mb-3 outline-none border-slate-50 focus:border-blue-200" placeholder="제목" />
                                        <div className="flex gap-1 mb-2 overflow-x-auto no-scrollbar">
                                            {['{이름}', '{시간}', '{교사}'].map(tag => (
                                                <button key={tag} onClick={() => insertTag(tp.id, tag)} className="bg-slate-100 text-[10px] px-2.5 py-1.5 rounded-lg font-black text-slate-500 whitespace-nowrap active:bg-slate-200">{tag.replace('{','').replace('}','')} 삽입</button>
                                            ))}
                                        </div>
                                        <textarea id={`textarea-${tp.id}`} value={tp.content} onChange={e => setTemplates(templates.map(t=>t.id===tp.id?{...t,content:e.target.value}:t))} className="w-full text-xs text-slate-500 bg-slate-50 p-4 rounded-2xl min-h-[100px] outline-none leading-relaxed" />
                                        <button onClick={() => confirm('삭제?') && setTemplates(templates.filter(t=>t.id!==tp.id))} className="mt-3 text-rose-500 text-[10px] font-bold">삭제</button>
                                    </div>
                                ))}
                                <button onClick={() => setTemplates([...templates,{id:'t'+Date.now(),title:'새 문구',content:''}])} className="w-full py-4 border-2 border-dashed border-slate-200 rounded-3xl text-slate-300 font-bold active:bg-white transition-colors">+ 추가</button>
                            </div>
                        )}
                    </main>

                    {/* ✅ 단체 발송 플로팅 바 (전면 수정됨) */}
                    {selectedIds.length > 0 && activeTab === 'list' && (
                        <div className="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md bg-slate-900/95 backdrop-blur-xl p-5 pb-8 rounded-t-[40px] shadow-[0_-10px_40px_rgba(0,0,0,0.3)] z-[60] slide-up border-t border-white/10">
                            <div className="flex justify-between items-center mb-5 px-2">
                                <div className="text-white">
                                    <span className="text-blue-400 font-black text-lg mr-1">{selectedIds.length}</span>
                                    <span className="font-bold text-sm text-slate-300 tracking-tight">명 선택됨</span>
                                </div>
                                <div className="flex gap-2">
                                    <button onClick={deleteSelectedStudents} className="bg-rose-500/20 text-rose-400 px-4 py-2 rounded-2xl text-[11px] font-bold active:scale-95 transition-transform"><i className="fa-solid fa-trash-can mr-1"></i>삭제</button>
                                    <button onClick={() => setSelectedIds([])} className="bg-white/10 text-white px-4 py-2 rounded-2xl text-[11px] font-bold active:scale-95">취소</button>
                                </div>
                            </div>
                            
                            {/* 버튼 정렬: 가로로 꽉 채우고 중앙 정렬, 줄바꿈 허용 */}
                            <div className="flex flex-wrap gap-2.5 justify-center overflow-y-auto max-h-48 no-scrollbar">
                                {templates.map(tp => (
                                    <button 
                                        key={tp.id} 
                                        onClick={() => sendSMS(students.filter(s=>selectedIds.includes(s.id)), tp)} 
                                        className="bg-blue-600 text-white px-6 py-3.5 rounded-2xl font-black text-xs shadow-lg active:bg-blue-500 transition-all flex-shrink-0 min-w-[100px]"
                                    >
                                        {tp.title} 발송
                                    </button>
                                ))}
                            </div>
                        </div>
                    )}

                    {activeTab === 'list' && selectedIds.length === 0 && (
                        <button onClick={() => { setEditingStudent(null); setShowAddModal(true); }} className="fixed bottom-6 right-6 w-15 h-15 bg-blue-600 text-white rounded-full shadow-2xl flex items-center justify-center text-xl z-50 active:scale-90 transition-transform"><i className="fa-solid fa-plus"></i></button>
                    )}

                    {/* 정보 수정 모달 */}
                    {showAddModal && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[80] flex items-center justify-center p-6">
                            <div className="bg-white w-full rounded-[44px] p-8 animate-in shadow-2xl overflow-y-auto max-h-[90vh] border border-white/20">
                                <h3 className="text-xl font-black mb-6 text-blue-600 text-center">{editingStudent ? '정보 수정' : '직접 추가'}</h3>
                                <div className="space-y-4 text-xs font-bold">
                                    <div className="grid grid-cols-2 gap-2">
                                        <select className="w-full p-4 bg-slate-50 rounded-2xl outline-none" value={editingStudent?.group || (activeGroupId === '전체' ? groups[0] : activeGroupId)} onChange={e => setEditingStudent({...editingStudent, group: e.target.value})}>
                                            {groups.map(g => <option key={g} value={g}>{g}</option>)}
                                        </select>
                                        <input className="w-full p-4 bg-slate-50 rounded-2xl outline-none border focus:border-blue-500 font-bold" value={editingStudent?.name || ''} onChange={e => setEditingStudent({...editingStudent, name: e.target.value})} placeholder="이름" />
                                    </div>
                                    <input className="w-full p-4 bg-slate-50 rounded-2xl outline-none font-medium" value={editingStudent?.self || ''} onChange={e => setEditingStudent({...editingStudent, self: e.target.value})} placeholder="본인 번호" />
                                    <div className="grid grid-cols-2 gap-2 font-medium">
                                        <input className="w-full p-4 bg-slate-50 rounded-2xl outline-none" value={editingStudent?.father || ''} onChange={e => setEditingStudent({...editingStudent, father: e.target.value})} placeholder="부 번호" />
                                        <input className="w-full p-4 bg-slate-50 rounded-2xl outline-none" value={editingStudent?.mother || ''} onChange={e => setEditingStudent({...editingStudent, mother: e.target.value})} placeholder="모 번호" />
                                    </div>
                                    <textarea className="w-full p-4 bg-slate-50 rounded-2xl outline-none min-h-[80px]" value={editingStudent?.memo || ''} onChange={e => setEditingStudent({...editingStudent, memo: e.target.value})} placeholder="메모" />
                                    <div className="flex flex-col gap-2 pt-4">
                                        <button onClick={() => { 
                                            const final = { ...editingStudent, group: editingStudent?.group || (activeGroupId === '전체' ? groups[0] : activeGroupId), activeTargets: editingStudent?.activeTargets || { self: true, father: false, mother: false } };
                                            if(final.name) { 
                                                if(final.id) setStudents(students.map(st => st.id === final.id ? final : st));
                                                else setStudents([...students, {...final, id: Date.now()}]);
                                                setShowAddModal(false); 
                                            } 
                                        }} className="w-full bg-blue-600 text-white py-4 rounded-3xl font-black shadow-lg">저장</button>
                                        <div className="flex gap-2">
                                            {editingStudent && <button onClick={() => deleteStudent(editingStudent.id)} className="flex-1 bg-rose-50 text-rose-500 font-bold py-4 rounded-3xl border border-rose-100">삭제</button>}
                                            <button onClick={() => setShowAddModal(false)} className="flex-1 font-bold text-slate-400 py-4">취소</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
