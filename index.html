<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>스마트 출결 매니저</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="출결매니저">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="theme-color" content="#2563eb">

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .active-tab { position: relative; color: #2563eb; }
        .active-tab::after { content: ''; position: absolute; bottom: -2px; left: 0; width: 100%; height: 3px; background-color: #2563eb; border-radius: 10px; }
        .animate-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        function App() {
            // --- 데이터 상태 ---
            const [students, setStudents] = useState(() => {
                const saved = localStorage.getItem('my_attendance_students');
                return saved ? JSON.parse(saved) : [];
            });
            const [templates, setTemplates] = useState(() => {
                const saved = localStorage.getItem('my_attendance_templates');
                return saved ? JSON.parse(saved) : [
                    { id: 'late', title: '지각', content: '[지각알림] {이름} 학생이 금일 {시간} 기준 등교 전입니다. 확인 부탁드립니다. - {교사}' },
                    { id: 'absent', title: '결석', content: '[결석알림] {이름} 학생이 금일 결석 상태입니다. 사유를 회신해 주시기 바랍니다. - {교사}' },
                    { id: 'sick', title: '인정결', content: '[안내] {이름} 학생의 인정결(생리결) 접수되었습니다. 증빙 서류를 지참해 보내주세요. - {교사}' }
                ];
            });
            const [logs, setLogs] = useState(() => {
                const saved = localStorage.getItem('my_attendance_logs');
                return saved ? JSON.parse(saved) : [];
            });
            const [teacherName, setTeacherName] = useState(localStorage.getItem('my_teacher_name') || '홍길동 선생님');
            
            // --- UI 상태 ---
            const [activeTab, setActiveTab] = useState('list');
            const [searchQuery, setSearchQuery] = useState('');
            const [selectedIds, setSelectedIds] = useState([]);
            const [showAddModal, setShowAddModal] = useState(false);
            const [targetContact, setTargetContact] = useState('mother');
            const [currentTime, setCurrentTime] = useState(new Date());
            const [newStudent, setNewStudent] = useState({ name: '', mother: '', father: '', other: '' });

            // --- 데이터 저장 ---
            useEffect(() => {
                localStorage.setItem('my_attendance_students', JSON.stringify(students));
                localStorage.setItem('my_attendance_templates', JSON.stringify(templates));
                localStorage.setItem('my_attendance_logs', JSON.stringify(logs));
                localStorage.setItem('my_teacher_name', teacherName);
            }, [students, templates, logs, teacherName]);

            useEffect(() => {
                const timer = setInterval(() => setCurrentTime(new Date()), 1000);
                return () => clearInterval(timer);
            }, []);

            const filteredStudents = useMemo(() => {
                return students.filter(s => s.name.includes(searchQuery));
            }, [students, searchQuery]);

            const downloadCSVTemplate = () => {
                const csvHeader = "이름,어머니번호,아버지번호,기타번호\n";
                const csvSample = "김철수,010-1234-5678,010-1111-2222,\n이영희,010-9876-5432,,010-0000-0000";
                const blob = new Blob(["\ufeff" + csvHeader + csvSample], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement("a");
                link.href = url;
                link.download = "학생명단_양식.csv";
                link.click();
            };

            const handleCSVUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (evt) => {
                    const text = evt.target.result;
                    const rows = text.split(/\r?\n/).filter(r => r.trim() !== '');
                    const newOnes = rows.slice(1).map((row, idx) => {
                        const cols = row.split(',').map(c => c.trim());
                        return { id: Date.now() + idx, name: cols[0], mother: cols[1], father: cols[2], other: cols[3] };
                    }).filter(s => s.name);
                    setStudents([...students, ...newOnes]);
                    alert(`${newOnes.length}명의 데이터가 추가되었습니다.`);
                };
                reader.readAsText(file, 'EUC-KR');
            };

            const sendSMS = (targets, template) => {
                const timeStr = currentTime.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
                const isIos = /iPhone|iPad|iPod/i.test(navigator.userAgent);

                targets.forEach(s => {
                    let phone = s[targetContact] || s.mother || s.father || s.other;
                    if (!phone) return;

                    const msg = template.content
                        .replace(/{이름}/g, s.name)
                        .replace(/{시간}/g, timeStr)
                        .replace(/{교사}/g, teacherName);

                    const smsUrl = `sms:${phone}${isIos ? '&' : '?'}body=${encodeURIComponent(msg)}`;
                    setLogs(prev => [{ id: Date.now(), time: new Date().toLocaleString(), target: s.name, content: msg }, ...prev].slice(0, 50));
                    window.open(smsUrl, '_blank');
                });
            };

            return (
                <div className="max-w-md mx-auto bg-white min-h-screen shadow-2xl flex flex-col relative">
                    <header className="p-6 bg-blue-600 text-white sticky top-0 z-30">
                        <div className="flex justify-between items-center mb-4">
                            <h1 className="text-2xl font-black tracking-tighter italic">ATTENDANCE</h1>
                            <div className="text-[10px] bg-white/20 px-2 py-1 rounded-full font-bold">{currentTime.toLocaleTimeString()}</div>
                        </div>
                        <div className="flex items-center gap-3 bg-white/10 p-3 rounded-2xl">
                            <i className="fa-solid fa-user-tie opacity-60"></i>
                            <input value={teacherName} onChange={e => setTeacherName(e.target.value)} className="bg-transparent border-none outline-none font-bold w-full" placeholder="선생님 성함" />
                        </div>
                    </header>

                    <nav className="flex border-b bg-white sticky top-[136px] z-30">
                        {[{id:'list', label:'명단', icon:'fa-users'}, {id:'templates', label:'문구', icon:'fa-pen-to-square'}, {id:'history', label:'이력', icon:'fa-list-ul'}].map(tab => (
                            <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`flex-1 py-4 text-sm font-bold flex items-center justify-center gap-2 ${activeTab === tab.id ? 'active-tab' : 'text-slate-400'}`}>
                                <i className={`fa-solid ${tab.icon} text-xs`}></i>{tab.label}
                            </button>
                        ))}
                    </nav>

                    <main className="flex-1 p-4 bg-slate-50 overflow-y-auto no-scrollbar pb-32">
                        {activeTab === 'list' && (
                            <div className="animate-in space-y-4">
                                <div className="flex flex-col gap-2">
                                    <div className="relative">
                                        <i className="fa-solid fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-300"></i>
                                        <input placeholder="학생 이름 검색" value={searchQuery} onChange={e => setSearchQuery(e.target.value)} className="w-full pl-10 pr-4 py-3 rounded-2xl shadow-sm outline-none focus:ring-2 focus:ring-blue-500 border-none font-medium" />
                                    </div>
                                    <div className="flex gap-2">
                                        <button onClick={downloadCSVTemplate} className="flex-1 bg-white border border-slate-200 py-2 rounded-xl text-[10px] font-bold text-slate-500"><i className="fa-solid fa-download mr-1"></i> 양식</button>
                                        <label className="flex-1 bg-white border border-slate-200 py-2 rounded-xl text-[10px] font-bold text-slate-500 text-center cursor-pointer">
                                            <i className="fa-solid fa-upload mr-1"></i> 일괄등록
                                            <input type="file" accept=".csv" onChange={handleCSVUpload} className="hidden" />
                                        </label>
                                    </div>
                                </div>

                                <div className="flex gap-1 p-1 bg-slate-200 rounded-xl">
                                    {['mother', 'father', 'other'].map(t => (
                                        <button key={t} onClick={() => setTargetContact(t)} className={`flex-1 py-1.5 rounded-lg text-xs font-black transition-all ${targetContact === t ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-500'}`}>{t==='mother'?'모':t==='father'?'부':'기타'}</button>
                                    ))}
                                </div>

                                <div className="space-y-3">
                                    {filteredStudents.map(s => (
                                        <div key={s.id} className={`bg-white p-4 rounded-3xl shadow-sm flex items-center gap-4 border-2 ${selectedIds.includes(s.id) ? 'border-blue-500' : 'border-transparent'}`}>
                                            <button onClick={() => setSelectedIds(prev => prev.includes(s.id) ? prev.filter(id => id !== s.id) : [...prev, s.id])} className={`w-6 h-6 rounded-lg border-2 flex items-center justify-center ${selectedIds.includes(s.id) ? 'bg-blue-600 border-blue-600 text-white' : 'border-slate-200'}`}>
                                                {selectedIds.includes(s.id) && <i className="fa-solid fa-check text-[10px]"></i>}
                                            </button>
                                            <div className="flex-1 truncate" onClick={() => setSelectedIds(prev => prev.includes(s.id) ? prev.filter(id => id !== s.id) : [...prev, s.id])}>
                                                <div className="font-bold text-slate-800">{s.name}</div>
                                                <div className="text-[10px] text-slate-400">모: {s.mother || '-'} / 부: {s.father || '-'}</div>
                                            </div>
                                            <div className="flex gap-1">
                                                <button onClick={() => sendSMS([s], templates[0])} className="w-8 h-8 bg-amber-50 text-amber-500 rounded-full flex items-center justify-center text-xs"><i className="fa-solid fa-clock"></i></button>
                                                <button onClick={() => sendSMS([s], templates[1])} className="w-8 h-8 bg-rose-50 text-rose-500 rounded-full flex items-center justify-center text-xs"><i className="fa-solid fa-exclamation-triangle"></i></button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {activeTab === 'templates' && (
                            <div className="animate-in space-y-4">
                                {templates.map(tp => (
                                    <div key={tp.id} className="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm">
                                        <input value={tp.title} onChange={e => setTemplates(templates.map(t => t.id === tp.id ? {...t, title: e.target.value} : t))} className="w-full font-black text-blue-600 border-b pb-1 mb-2 outline-none border-slate-50" />
                                        <textarea value={tp.content} onChange={e => setTemplates(templates.map(t => t.id === tp.id ? {...t, content: e.target.value} : t))} className="w-full text-xs text-slate-500 bg-slate-50 p-3 rounded-xl min-h-[80px] outline-none" />
                                        <div className="flex justify-between items-center mt-2">
                                            <span className="text-[9px] text-slate-300">치환자: {'{이름}, {시간}, {교사}'}</span>
                                            <button onClick={() => setTemplates(templates.filter(t => t.id !== tp.id))} className="text-slate-200 hover:text-rose-500"><i className="fa-solid fa-trash-can text-xs"></i></button>
                                        </div>
                                    </div>
                                ))}
                                <button onClick={() => setTemplates([...templates, {id: Date.now(), title:'새 제목', content:''}])} className="w-full py-4 border-2 border-dashed border-slate-200 rounded-3xl text-slate-400 font-bold text-sm">+ 문구 추가</button>
                            </div>
                        )}

                        {activeTab === 'history' && (
                            <div className="animate-in space-y-3">
                                {logs.map(log => (
                                    <div key={log.id} className="bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
                                        <div className="flex justify-between font-black text-blue-600 text-[11px] mb-1">
                                            <span>{log.target}</span><span>{log.time}</span>
                                        </div>
                                        <p className="text-[11px] text-slate-500 line-clamp-2">{log.content}</p>
                                    </div>
                                ))}
                                {logs.length === 0 && <div className="text-center py-20 text-slate-300 text-sm">기록이 없습니다.</div>}
                            </div>
                        )}
                    </main>

                    {selectedIds.length > 0 && activeTab === 'list' && (
                        <div className="fixed bottom-6 left-1/2 -translate-x-1/2 w-[calc(100%-2rem)] max-w-sm bg-slate-900/90 backdrop-blur-md p-5 rounded-[32px] shadow-2xl z-50 animate-in">
                            <div className="flex justify-between items-center mb-4 px-2">
                                <span className="text-white font-black text-sm">{selectedIds.length}명 선택됨</span>
                                <button onClick={() => setSelectedIds([])} className="text-[10px] text-slate-400 underline">취소</button>
                            </div>
                            <div className="flex gap-2 overflow-x-auto no-scrollbar">
                                {templates.map(tp => (
                                    <button key={tp.id} onClick={() => sendSMS(students.filter(s => selectedIds.includes(s.id)), tp)} className="flex-shrink-0 bg-blue-600 text-white px-5 py-3 rounded-2xl font-black text-xs">단체 {tp.title}</button>
                                ))}
                            </div>
                        </div>
                    )}

                    {activeTab === 'list' && selectedIds.length === 0 && (
                        <button onClick={() => setShowAddModal(true)} className="fixed bottom-6 right-6 w-14 h-14 bg-blue-600 text-white rounded-full shadow-2xl flex items-center justify-center text-xl transition-transform active:scale-90 z-40">
                            <i className="fa-solid fa-plus"></i>
                        </button>
                    )}

                    {showAddModal && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[60] flex items-center justify-center p-6">
                            <div className="bg-white w-full rounded-[40px] p-8 animate-in">
                                <h3 className="text-xl font-black mb-6">학생 추가</h3>
                                <div className="space-y-4">
                                    <input placeholder="이름" className="w-full p-4 bg-slate-50 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 font-bold" value={newStudent.name} onChange={e => setNewStudent({...newStudent, name: e.target.value})} />
                                    <input placeholder="어머니 번호" className="w-full p-4 bg-slate-50 rounded-2xl outline-none text-sm" value={newStudent.mother} onChange={e => setNewStudent({...newStudent, mother: e.target.value})} />
                                    <input placeholder="아버지 번호" className="w-full p-4 bg-slate-50 rounded-2xl outline-none text-sm" value={newStudent.father} onChange={e => setNewStudent({...newStudent, father: e.target.value})} />
                                    <div className="flex gap-4 pt-4">
                                        <button onClick={() => setShowAddModal(false)} className="flex-1 font-bold text-slate-400">취소</button>
                                        <button onClick={() => { if(newStudent.name) { setStudents([...students, {...newStudent, id: Date.now()}]); setNewStudent({name:'',mother:'',father:'',other:''}); setShowAddModal(false); } }} className="flex-1 bg-blue-600 text-white py-4 rounded-2xl font-bold">저장</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
