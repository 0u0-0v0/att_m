<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>출석 알림 매니저</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8fafc; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function App() {
            const [students, setStudents] = useState(() => {
                const saved = localStorage.getItem('attendance_students');
                return saved ? JSON.parse(saved) : [];
            });
            const [selectedIds, setSelectedIds] = useState([]);
            const [teacherName, setTeacherName] = useState(localStorage.getItem('attendance_teacher') || '홍길동 선생님');
            const [newStudent, setNewStudent] = useState({ name: '', motherPhone: '', fatherPhone: '' });
            const [currentTime, setCurrentTime] = useState(new Date());
            const [showSettings, setShowSettings] = useState(false);

            useEffect(() => {
                localStorage.setItem('attendance_students', JSON.stringify(students));
                localStorage.setItem('attendance_teacher', teacherName);
            }, [students, teacherName]);

            useEffect(() => {
                const timer = setInterval(() => setCurrentTime(new Date()), 1000);
                return () => clearInterval(timer);
            }, []);

            const addStudent = () => {
                if (!newStudent.name) return;
                setStudents([...students, { ...newStudent, id: Date.now() }]);
                setNewStudent({ name: '', motherPhone: '', fatherPhone: '' });
            };

            const deleteStudent = (id) => {
                if(confirm("삭제하시겠습니까?")) setStudents(students.filter(s => s.id !== id));
            };

            const toggleSelect = (id) => {
                setSelectedIds(prev => prev.includes(id) ? prev.filter(i => i !== id) : [...prev, id]);
            };

            const sendMessage = (targets, type) => {
                const timeStr = currentTime.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
                let msg = "";
                if (targets.length > 1) {
                    msg = `[출결알림]\n학생이 금일 ${timeStr} 기준 ${type === 'late' ? '지각' : '결석'}입니다. - ${teacherName}`;
                } else {
                    msg = `[출결알림]\n${targets[0].name} 학생이 금일 ${timeStr} 기준 ${type === 'late' ? '지각' : '결석'}입니다. - ${teacherName}`;
                }

                const phones = targets.flatMap(s => [s.motherPhone, s.fatherPhone].filter(p => p)).join(',');
                const isIos = /iPhone|iPad|iPod/i.test(navigator.userAgent);
                window.location.href = `sms:${phones}${isIos ? '&' : '?'}body=${encodeURIComponent(msg)}`;
            };

            return (
                <div className="max-w-md mx-auto p-4 pb-24">
                    <header className="flex justify-between items-center mb-6 bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                        <div>
                            <h1 className="text-xl font-bold text-blue-600">출석 알림 매니저</h1>
                            <p className="text-xs text-slate-500">{currentTime.toLocaleString()}</p>
                        </div>
                        <button onClick={() => setShowSettings(!showSettings)} className="text-slate-400 p-2"><i className="fa-solid fa-gear text-xl"></i></button>
                    </header>

                    {showSettings && (
                        <div className="mb-6 bg-blue-50 p-4 rounded-xl border border-blue-200 animate-pulse-once">
                            <label className="block text-sm font-bold mb-2">선생님 성함 설정</label>
                            <input value={teacherName} onChange={e => setTeacherName(e.target.value)} className="w-full p-2 rounded border" />
                        </div>
                    )}

                    <section className="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 mb-6">
                        <h2 className="font-bold mb-3"><i className="fa-solid fa-user-plus mr-2"></i>학생 등록</h2>
                        <input placeholder="이름" value={newStudent.name} onChange={e => setNewStudent({...newStudent, name: e.target.value})} className="w-full p-2 mb-2 border rounded" />
                        <div className="flex gap-2 mb-2">
                            <input placeholder="어머니 번호" value={newStudent.motherPhone} onChange={e => setNewStudent({...newStudent, motherPhone: e.target.value})} className="w-1/2 p-2 border rounded" />
                            <input placeholder="아버지 번호" value={newStudent.fatherPhone} onChange={e => setNewStudent({...newStudent, fatherPhone: e.target.value})} className="w-1/2 p-2 border rounded" />
                        </div>
                        <button onClick={addStudent} className="w-full bg-slate-800 text-white py-2 rounded-xl font-bold">등록하기</button>
                    </section>

                    <div className="flex justify-between items-center mb-4">
                        <h3 className="font-bold text-slate-600">명단 ({students.length})</h3>
                        <button onClick={() => setSelectedIds(selectedIds.length === students.length ? [] : students.map(s => s.id))} className="text-sm text-blue-600 font-bold">전체 선택</button>
                    </div>

                    <div className="space-y-3">
                        {students.map(s => (
                            <div key={s.id} className={`bg-white p-4 rounded-2xl border flex items-center gap-3 ${selectedIds.includes(s.id) ? 'border-blue-500 bg-blue-50/30' : 'border-slate-100'}`}>
                                <div onClick={() => toggleSelect(s.id)} className={`w-6 h-6 rounded border flex items-center justify-center ${selectedIds.includes(s.id) ? 'bg-blue-600 border-blue-600 text-white' : 'bg-white'}`}>
                                    {selectedIds.includes(s.id) && <i className="fa-solid fa-check text-xs"></i>}
                                </div>
                                <div className="flex-1" onClick={() => toggleSelect(s.id)}>
                                    <div className="font-bold">{s.name}</div>
                                    <div className="text-[10px] text-slate-400">모: {s.motherPhone} / 부: {s.fatherPhone}</div>
                                </div>
                                <div className="flex gap-1">
                                    <button onClick={() => sendMessage([s], 'late')} className="p-2 bg-amber-50 text-amber-600 rounded-lg"><i className="fa-solid fa-clock"></i></button>
                                    <button onClick={() => sendMessage([s], 'absent')} className="p-2 bg-rose-50 text-rose-600 rounded-lg"><i className="fa-solid fa-circle-exclamation"></i></button>
                                    <button onClick={() => deleteStudent(s.id)} className="p-2 text-slate-300"><i className="fa-solid fa-trash"></i></button>
                                </div>
                            </div>
                        ))}
                    </div>

                    {selectedIds.length > 0 && (
                        <div className="fixed bottom-6 left-4 right-4 bg-slate-900 text-white p-4 rounded-2xl shadow-2xl flex justify-between items-center">
                            <span className="font-bold">{selectedIds.length}명 선택됨</span>
                            <div className="flex gap-2">
                                <button onClick={() => sendMessage(students.filter(s => selectedIds.includes(s.id)), 'late')} className="bg-amber-500 px-4 py-2 rounded-xl font-bold text-sm">단체 지각</button>
                                <button onClick={() => sendMessage(students.filter(s => selectedIds.includes(s.id)), 'absent')} className="bg-rose-500 px-4 py-2 rounded-xl font-bold text-sm">단체 결석</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
