<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>스마트 출결 매니저 Pro</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="출결매니저">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="theme-color" content="#2563eb">

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .active-tab { position: relative; color: #2563eb; }
        .active-tab::after { content: ''; position: absolute; bottom: -2px; left: 0; width: 100%; height: 3px; background-color: #2563eb; border-radius: 10px; }
        .animate-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        function App() {
            // --- 데이터 상태 관리 ---
            const [groups, setGroups] = useState(() => JSON.parse(localStorage.getItem('att_groups')) || ['1반']);
            const [activeGroupId, setActiveGroupId] = useState(() => localStorage.getItem('att_active_group') || '1반');
            const [students, setStudents] = useState(() => JSON.parse(localStorage.getItem('att_students')) || []);
            const [templates, setTemplates] = useState(() => JSON.parse(localStorage.getItem('att_templates')) || [
                { id: 'late', title: '지각', content: '[지각알림] {이름} 학생이 금일 {시간} 기준 미등교 상태입니다. 확인 부탁드립니다. - {교사}' },
                { id: 'absent', title: '결석', content: '[결석알림] {이름} 학생이 금일 결석입니다. 사유를 회신해 주세요. - {교사}' }
            ]);
            const [logs, setLogs] = useState(() => JSON.parse(localStorage.getItem('att_logs')) || []);
            const [teacherName, setTeacherName] = useState(localStorage.getItem('att_teacher_name') || '정유안 선생님');
            
            const [activeTab, setActiveTab] = useState('list');
            const [searchQuery, setSearchQuery] = useState('');
            const [selectedIds, setSelectedIds] = useState([]);
            const [targetTypes, setTargetTypes] = useState({ self: true, father: false, mother: false });
            const [currentTime, setCurrentTime] = useState(new Date());
            const [showAddModal, setShowAddModal] = useState(false);
            const [editingStudent, setEditingStudent] = useState(null);

            // 로컬 스토리지 동기화
            useEffect(() => {
                localStorage.setItem('att_groups', JSON.stringify(groups));
                localStorage.setItem('att_active_group', activeGroupId);
                localStorage.setItem('att_students', JSON.stringify(students));
                localStorage.setItem('att_templates', JSON.stringify(templates));
                localStorage.setItem('att_logs', JSON.stringify(logs));
                localStorage.setItem('att_teacher_name', teacherName);
            }, [groups, activeGroupId, students, templates, logs, teacherName]);

            useEffect(() => {
                const timer = setInterval(() => setCurrentTime(new Date()), 1000);
                return () => clearInterval(timer);
            }, []);

            // 필터링 명단
            const filteredStudents = useMemo(() => {
                return students.filter(s => 
                    (activeGroupId === '전체' || s.group === activeGroupId) && 
                    s.name.includes(searchQuery)
                );
            }, [students, activeGroupId, searchQuery]);

            // --- 문구 자동 삽입 로직 ---
            const insertTag = (id, tag) => {
                const textarea = document.getElementById(`textarea-${id}`);
                if (!textarea) return;
                const start = textarea.selectionStart;
                const end = textarea.selectionEnd;
                const text = templates.find(t => t.id === id).content;
                const newText = text.substring(0, start) + tag + text.substring(end);
                
                setTemplates(templates.map(t => t.id === id ? { ...t, content: newText } : t));
                setTimeout(() => {
                    textarea.focus();
                    textarea.setSelectionRange(start + tag.length, start + tag.length);
                }, 10);
            };

            // --- 백업 및 파일 핸들링 ---
            const exportData = () => {
                const data = { groups, students, templates, teacherName };
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `출결_백업_${new Date().toISOString().slice(0,10)}.json`;
                a.click();
            };

            const importData = (e) => {
                const file = e.target.files[0];
                if (!file || !confirm("데이터를 복구하시겠습니까? 기존 데이터는 삭제됩니다.")) return;
                const reader = new FileReader();
                reader.onload = (evt) => {
                    try {
                        const d = JSON.parse(evt.target.result);
                        if (d.groups) setGroups(d.groups);
                        if (d.students) setStudents(d.students);
                        if (d.templates) setTemplates(d.templates);
                        alert("복구 완료!");
                    } catch (err) { alert("파일 형식이 잘못되었습니다."); }
                };
                reader.readAsText(file);
            };

            const downloadTemplate = () => {
                const csv = "\ufeff학급,이름,본인번호,부번호,모번호\n1반,홍길동,010-0000-0000,010-1111-1111,010-2222-2222";
                const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = '명단양식.csv'; a.click();
            };

            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (evt) => {
                    const rows = evt.target.result.split(/\r?\n/).filter(l => l.trim() !== '');
                    const newGrps = new Set(groups);
                    const newStus = rows.slice(1).map((row, i) => {
                        const c = row.split(',').map(v => v.trim());
                        if (c[0]) newGrps.add(c[0]);
                        return { id: Date.now()+i, group: c[0]||'기본', name: c[1]||'', self: c[2]||'', father: c[3]||'', mother: c[4]||'' };
                    }).filter(s => s.name);
                    setGroups(Array.from(newGrps));
                    setStudents([...students, ...newStus]);
                };
                reader.readAsText(file, 'EUC-KR');
            };

            // --- 실행 기능 ---
            const makeCall = (s) => {
                const p = targetTypes.self && s.self ? s.self : (targetTypes.father && s.father ? s.father : s.mother);
                if (p) window.location.href = `tel:${p}`; else alert("번호 없음");
            };

            const sendSMS = (targets, tp) => {
                const time = currentTime.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
                const isIos = /iPhone|iPad|iPod/i.test(navigator.userAgent);
                targets.forEach(s => {
                    const rec = [];
                    if (targetTypes.self && s.self) rec.push(s.self);
                    if (targetTypes.father && s.father) rec.push(s.father);
                    if (targetTypes.mother && s.mother) rec.push(s.mother);
                    if (rec.length === 0) return;
                    const msg = tp.content.replace(/{이름}/g, s.name).replace(/{시간}/g, time).replace(/{교사}/g, teacherName);
                    window.open(`sms:${rec.join(',')}${isIos ? '&' : '?'}body=${encodeURIComponent(msg)}`, '_blank');
                    setLogs(prev => [{ id: Date.now()+Math.random(), time: new Date().toLocaleString(), target: `[${s.group}] ${s.name}`, content: msg }, ...prev].slice(0, 50));
                });
            };

            return (
                <div className="max-w-md mx-auto bg-white min-h-screen flex flex-col shadow-2xl relative">
                    <header className="p-6 bg-blue-600 text-white sticky top-0 z-30 shadow-md">
                        <div className="flex justify-between items-center mb-4 font-black italic tracking-tighter uppercase">
                            <h1 className="text-2xl">Attendance Pro</h1>
                            <span className="text-[10px] bg-white/20 px-2 py-1 rounded-full">{currentTime.toLocaleTimeString()}</span>
                        </div>
                        <input value={teacherName} onChange={e => setTeacherName(e.target.value)} className="bg-white/10 p-3 rounded-2xl w-full border-none outline-none font-bold placeholder:text-blue-100" placeholder="선생님 성함" />
                    </header>

                    <nav className="flex border-b bg-white sticky top-[136px] z-30 shadow-sm">
                        {[{id:'list',l:'명단',i:'fa-users'},{id:'templates',l:'문구',i:'fa-pen-to-square'},{id:'history',l:'이력',i:'fa-list-ul'}].map(t => (
                            <button key={t.id} onClick={() => setActiveTab(t.id)} className={`flex-1 py-4 text-sm font-bold flex items-center justify-center gap-2 ${activeTab === t.id ? 'active-tab' : 'text-slate-300'}`}>
                                <i className={`fa-solid ${t.i} text-xs`}></i>{t.l}
                            </button>
                        ))}
                    </nav>

                    <main className="flex-1 p-4 bg-slate-50 overflow-y-auto no-scrollbar pb-32">
                        {activeTab === 'list' && (
                            <div className="animate-in space-y-4">
                                <div className="space-y-3">
                                    <div className="flex gap-2 overflow-x-auto no-scrollbar pb-1">
                                        {['전체', ...groups].map(g => (
                                            <button key={g} onClick={() => setActiveGroupId(g)} className={`flex-shrink-0 px-4 py-2 rounded-xl text-[11px] font-black transition-all ${activeGroupId === g ? 'bg-blue-600 text-white shadow-md' : 'bg-white text-slate-400 border'}`}>{g}</button>
                                        ))}
                                        <button onClick={() => { const n = prompt('새 학급 이름'); if(n) setGroups([...groups, n]); }} className="flex-shrink-0 w-8 h-8 rounded-xl bg-slate-200 text-slate-500 flex items-center justify-center"><i className="fa-solid fa-plus text-[10px]"></i></button>
                                    </div>
                                    <input placeholder="학생 이름 검색" value={searchQuery} onChange={e => setSearchQuery(e.target.value)} className="w-full px-4 py-3 rounded-2xl shadow-sm outline-none border-none font-medium text-sm" />
                                    <div className="flex gap-2">
                                        <button onClick={downloadTemplate} className="flex-1 bg-white border border-slate-200 py-3 rounded-2xl text-[11px] font-black text-blue-600 shadow-sm"><i className="fa-solid fa-download mr-1"></i> 양식 받기</button>
                                        <label className="flex-1 bg-blue-600 border border-blue-600 py-3 rounded-2xl text-[11px] font-black text-white text-center cursor-pointer shadow-lg active:scale-95 transition-all">
                                            <i className="fa-solid fa-upload mr-1"></i> 명단 올리기 <input type="file" accept=".csv" onChange={handleFileUpload} className="hidden" />
                                        </label>
                                    </div>
                                </div>
                                <div className="bg-white p-3 rounded-2xl shadow-sm border flex gap-2">
                                    {[{k:'self',l:'본인'},{k:'father',l:'부'},{k:'mother',l:'모'}].map(i => (
                                        <button key={i.k} onClick={() => setTargetTypes({...targetTypes, [i.k]: !targetTypes[i.k]})} className={`flex-1 py-2.5 rounded-xl text-xs font-black transition-all ${targetTypes[i.k] ? 'bg-blue-600 text-white shadow-md' : 'bg-slate-50 text-slate-300'}`}>{i.l}</button>
                                    ))}
                                </div>
                                <div className="space-y-3">
                                    {filteredStudents.map(s => (
                                        <div key={s.id} className={`bg-white p-4 rounded-3xl shadow-sm flex items-center gap-3 border-2 transition-all ${selectedIds.includes(s.id) ? 'border-blue-500 ring-4 ring-blue-50' : 'border-transparent'}`}>
                                            <div onClick={() => setSelectedIds(p => p.includes(s.id)?p.filter(id=>id!==s.id):[...p,s.id])} className={`w-7 h-7 rounded-xl border-2 flex items-center justify-center flex-shrink-0 ${selectedIds.includes(s.id)?'bg-blue-600 border-blue-600 text-white':'border-slate-100 bg-slate-50'}`}>
                                                {selectedIds.includes(s.id) && <i className="fa-solid fa-check text-xs"></i>}
                                            </div>
                                            <div className="flex-1 truncate" onClick={() => { setEditingStudent(s); setShowAddModal(true); }}>
                                                <div className="font-bold text-slate-800 text-sm">{s.name} <span className="text-[9px] bg-slate-100 px-1.5 py-0.5 rounded-lg text-slate-400 font-medium ml-1">{s.group}</span></div>
                                                <div className="text-[9px] text-slate-400 font-medium truncate mt-0.5">본인:{s.self||'-'} / 부:{s.father||'-'} / 모:{s.mother||'-'}</div>
                                            </div>
                                            <div className="flex gap-1.5">
                                                <button onClick={() => makeCall(s)} className="w-9 h-9 bg-emerald-50 text-emerald-500 rounded-2xl flex items-center justify-center text-xs shadow-sm"><i className="fa-solid fa-phone"></i></button>
                                                <button onClick={() => sendSMS([s], templates[0])} className="w-9 h-9 bg-amber-50 text-amber-500 rounded-2xl flex items-center justify-center text-xs shadow-sm"><i className="fa-solid fa-clock"></i></button>
                                                <button onClick={() => sendSMS([s], templates[1])} className="w-9 h-9 bg-rose-50 text-rose-500 rounded-2xl flex items-center justify-center text-xs shadow-sm"><i className="fa-solid fa-triangle-exclamation"></i></button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {activeTab === 'templates' && (
                            <div className="animate-in space-y-4 pb-10">
                                {templates.map(tp => (
                                    <div key={tp.id} className="bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
                                        <input value={tp.title} onChange={e => setTemplates(templates.map(t=>t.id===tp.id?{...t,title:e.target.value}:t))} className="w-full font-black text-blue-600 border-b pb-2 mb-3 outline-none border-slate-50 focus:border-blue-200" />
                                        <div className="flex gap-1 mb-3 overflow-x-auto no-scrollbar">
                                            {['{이름}', '{시간}', '{교사}'].map(tag => (
                                                <button key={tag} onClick={() => insertTag(tp.id, tag)} className="bg-slate-100 text-[10px] px-3 py-1.5 rounded-xl font-bold text-slate-500 active:scale-95">{tag.replace('{','').replace('}','')} 삽입</button>
                                            ))}
                                        </div>
                                        <textarea id={`textarea-${tp.id}`} value={tp.content} onChange={e => setTemplates(templates.map(t=>t.id===tp.id?{...t,content:e.target.value}:t))} className="w-full text-xs text-slate-400 bg-slate-50 p-3 rounded-xl min-h-[80px] outline-none leading-relaxed" />
                                        <button onClick={() => { if(confirm('삭제?')) setTemplates(templates.filter(t=>t.id!==tp.id)) }} className="mt-2 text-rose-500 text-[10px] font-bold"><i className="fa-solid fa-trash-can mr-1"></i> 삭제</button>
                                    </div>
                                ))}
                                <button onClick={() => setTemplates([...templates,{id:Date.now(),title:'제목',content:''}])} className="w-full py-4 border-2 border-dashed rounded-3xl text-slate-300 font-bold">+ 문구 추가</button>
                                <div className="mt-10 pt-8 border-t space-y-3">
                                    <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-widest px-1">데이터 통합 관리</h3>
                                    <div className="flex gap-2">
                                        <button onClick={exportData} className="flex-1 bg-slate-900 text-white py-4 rounded-3xl text-[11px] font-black"><i className="fa-solid fa-download mr-2 text-blue-400"></i> 백업 받기</button>
                                        <label className="flex-1 bg-white border-2 py-4 rounded-3xl text-[11px] font-black text-slate-500 text-center cursor-pointer shadow-sm">
                                            <i className="fa-solid fa-upload mr-2 text-emerald-500"></i> 백업 복구 <input type="file" accept=".json" onChange={importData} className="hidden" />
                                        </label>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'history' && (
                            <div className="animate-in space-y-3">
                                {logs.map(log => (
                                    <div key={log.id} className="bg-white p-4 rounded-2xl shadow-sm text-[10px] border border-slate-100">
                                        <div className="flex justify-between font-black text-blue-600 mb-1"><span>{log.target}</span><span className="text-[8px] font-normal text-slate-300">{log.time}</span></div>
                                        <p className="text-slate-500 line-clamp-2 leading-relaxed bg-slate-50 p-2 rounded-xl">{log.content}</p>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>

                    {selectedIds.length > 0 && activeTab === 'list' && (
                        <div className="fixed bottom-6 left-1/2 -translate-x-1/2 w-[calc(100%-2rem)] max-w-sm bg-slate-900/95 backdrop-blur-md p-6 rounded-[40px] shadow-2xl z-50 animate-in border border-white/10">
                            <div className="flex justify-between mb-4 px-2 items-center text-white font-black text-sm">
                                <span><i className="fa-solid fa-check-circle mr-2 text-blue-400"></i>{selectedIds.length}명 선택</span>
                                <button onClick={() => setSelectedIds([])} className="text-[10px] text-slate-400 underline italic">해제</button>
                            </div>
                            <div className="flex gap-2 overflow-x-auto no-scrollbar pb-1">
                                {templates.map(tp => (
                                    <button key={tp.id} onClick={() => sendSMS(students.filter(s=>selectedIds.includes(s.id)), tp)} className="flex-shrink-0 bg-blue-600 text-white px-5 py-3 rounded-2xl font-black text-xs shadow-lg">단체 {tp.title}</button>
                                ))}
                            </div>
                        </div>
                    )}

                    {activeTab === 'list' && selectedIds.length === 0 && (
                        <button onClick={() => { setEditingStudent(null); setShowAddModal(true); }} className="fixed bottom-6 right-6 w-14 h-14 bg-blue-600 text-white rounded-full shadow-2xl flex items-center justify-center text-xl z-40 transition-all active:scale-90"><i className="fa-solid fa-plus"></i></button>
                    )}

                    {showAddModal && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[80] flex items-center justify-center p-6">
                            <div className="bg-white w-full rounded-[44px] p-8 animate-in shadow-2xl border border-white/20">
                                <h3 className="text-xl font-black mb-6 text-blue-600">{editingStudent ? '정보 수정' : '직접 추가'}</h3>
                                <div className="space-y-4 text-xs font-bold">
                                    <div className="grid grid-cols-2 gap-2">
                                        <select className="w-full p-4 bg-slate-50 rounded-2xl outline-none" value={editingStudent?.group || activeGroupId !== '전체' ? activeGroupId : groups[0]} onChange={e => setEditingStudent({...editingStudent, group: e.target.value})}>
                                            {groups.map(g => <option key={g} value={g}>{g}</option>)}
                                        </select>
                                        <input className="w-full p-4 bg-slate-50 rounded-2xl outline-none border focus:border-blue-500" value={editingStudent?.name || ''} onChange={e => setEditingStudent({...editingStudent, name: e.target.value})} placeholder="성함" />
                                    </div>
                                    <input className="w-full p-4 bg-slate-50 rounded-2xl outline-none" value={editingStudent?.self || ''} onChange={e => setEditingStudent({...editingStudent, self: e.target.value})} placeholder="본인 번호" />
                                    <div className="grid grid-cols-2 gap-2 font-medium">
                                        <input className="w-full p-4 bg-slate-50 rounded-2xl outline-none" value={editingStudent?.father || ''} onChange={e => setEditingStudent({...editingStudent, father: e.target.value})} placeholder="부 번호" />
                                        <input className="w-full p-4 bg-slate-50 rounded-2xl outline-none" value={editingStudent?.mother || ''} onChange={e => setEditingStudent({...editingStudent, mother: e.target.value})} placeholder="모 번호" />
                                    </div>
                                    <div className="flex gap-4 pt-6">
                                        <button onClick={() => { if(editingStudent?.id) { if(confirm('삭제?')) setStudents(students.filter(s => s.id !== editingStudent.id)); setShowAddModal(false); } else { setShowAddModal(false); } }} className="flex-1 font-bold text-rose-500">{editingStudent?.id ? '삭제' : '취소'}</button>
                                        <button onClick={() => { 
                                            const finalStudent = { ...editingStudent, group: editingStudent?.group || (activeGroupId !== '전체' ? activeGroupId : groups[0]) };
                                            if(finalStudent.name) { 
                                                if(finalStudent.id) { setStudents(students.map(st => st.id === finalStudent.id ? finalStudent : st)); } 
                                                else { setStudents([...students, {...finalStudent, id: Date.now()}]); } 
                                                setShowAddModal(false); 
                                            } 
                                        }} className="flex-1 bg-blue-600 text-white py-4 rounded-3xl font-black shadow-lg">저장</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
